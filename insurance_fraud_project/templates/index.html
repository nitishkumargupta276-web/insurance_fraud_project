<!DOCTYPE html>
<html>
<head>

<title>Insurance Fraud Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">Insurance Fraud Detection</h2>

<form action="/predict" method="post">

<div class="mb-3">
<label class="form-label">Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Claim Amount</label>
<input type="number" name="claim_amount" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Previous Claims</label>
<input type="number" name="previous_claims" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Policy Years</label>
<input type="number" name="policy_years" class="form-control" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Check Fraud
</button>

</form>

{% if prediction %}

<div class="alert alert-info text-center mt-4">

Prediction : {{ prediction }}

</div>

{% endif %}

</div>

</div>

</body>
</html>

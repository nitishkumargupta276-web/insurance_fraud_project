<!DOCTYPE html>
<html>
<head>
    <title>Insurance Fraud Detection</title>
</head>
<body>
<h2>Enter Claim Details</h2>
<form action="/predict" method="post">

<label>Age:</label>
<input type="number" name="age" required><br><br>

<label>Claim Amount:</label>
<input type="number" name="claim_amount" required><br><br>

<label>Previous Claims:</label>
<input type="number" name="previous_claims" required><br><br>

<label>Policy Years:</label>
<input type="number" name="policy_years" required><br><br>

<input type="submit" value="Detect">

</form>

{% if prediction %}
<h3>Prediction: {{ prediction }}</h3>
{% endif %}
</body>
</html>
